name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-cov black ruff mypy

    - name: Run black (format check)
      run: |
        black --check .

    - name: Run ruff (linting)
      run: |
        ruff check .

    - name: Run mypy (type checking)
      run: |
        mypy utils/ --ignore-missing-imports

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=utils --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Test imports
      run: |
        python -c "from shared.utils import vision, time_utils, multi_search; print('✅ All modules import successfully')"
        python -c "from shared.utils import document_parsers, embeddings; print('✅ Data modules import successfully')"
        python -c "from shared.utils import file_utils, tts, citation; print('✅ Utility modules import successfully')"

    - name: Run integration tests (if marked)
      run: |
        pytest tests/ -v -m integration || echo "No integration tests found"

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: Run bandit (security linting)
      run: |
        bandit -r utils/ -f json -o bandit-report.json || true
        bandit -r utils/

    - name: Run safety (dependency check)
      run: |
        safety check --json || true
        safety check

    - name: Run pip-audit (vulnerability scan)
      run: |
        pip-audit || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
        retention-days: 30


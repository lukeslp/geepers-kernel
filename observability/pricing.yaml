# LLM Provider Pricing
# Per 1M tokens (USD). Update when providers change rates.
# Last updated: 2026-02-19
#
# Model ID keys must match exactly what is passed to CostTracker.calculate_cost().
# Claude 4.x models use IDs without date suffixes (e.g., claude-sonnet-4-6).
# Claude 3.x models use dated IDs (e.g., claude-3-5-sonnet-20241022).
# This reflects how Anthropic's API identifies these models in usage responses.

openai:
  gpt-4o:           { prompt: 2.50,  completion: 10.00 }
  gpt-4o-mini:      { prompt: 0.15,  completion: 0.60  }
  gpt-4-turbo:      { prompt: 10.00, completion: 30.00 }
  gpt-3.5-turbo:    { prompt: 0.50,  completion: 1.50  }
  o1:               { prompt: 15.00, completion: 60.00 }
  o1-mini:          { prompt: 3.00,  completion: 12.00 }
  o3-mini:          { prompt: 1.10,  completion: 4.40  }

anthropic:
